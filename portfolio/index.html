<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Intro Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 700px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #dcdcdc;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            font-size: 1.1em;
        }

        .highlight {
            color: #00d4ff;
            font-weight: bold;
        }

        .btn {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 20px;
            background: #00d4ff;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #00a6c4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Hello, I'm Satish Chauhan</h1>
    <h2>Cloud Engineer</h2>

    <p>
        I have <span class="highlight">1.5 years of experience</span> as a 
        <span class="highlight">System Administrator</span> at Wipro, 
        where I worked with the <span class="highlight">HDFC Bank</span> client.
    </p>

    <p>
        Recently, I transitioned into a <span class="highlight">Cloud Engineer</span> role, 
        focusing on building scalable, reliable, and modern cloud solutions.
    </p>

    <a href="#" class="btn">Contact Me</a>
</div>

</body>
</html>
